{% extends 'base.html' %}
{% block content %}
<section class="container">
  <h1>Checkout</h1>
  <form id="checkout-form">
    <input name="full_name" placeholder="Nombre" required>
    <input name="email" placeholder="Email" required>
    <input name="phone" placeholder="Teléfono">
    <input name="line1" placeholder="Dirección" required>
    <input name="city" placeholder="Ciudad" required>
    <input name="state" placeholder="Estado/Depto" required>
    <input name="coupon_code" placeholder="Cupón">
    <button class="btn" type="submit">Confirmar pedido</button>
  </form>
  <div id="checkout-result"></div>
</section>
{% endblock %}
