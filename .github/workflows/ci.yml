name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  quality-and-security:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ecommerce_perle
    env:
      DJANGO_SECRET_KEY: ci-secret-key-with-more-than-fifty-characters-123456789
      DEBUG: "1"
      ALLOWED_HOSTS: "127.0.0.1,localhost"
      CSRF_TRUSTED_ORIGINS: "http://127.0.0.1:8000,http://localhost:8000"
      DATABASE_URL: "sqlite:///db.sqlite3"
      WHATSAPP_PHONE: ""
      SECURE_HSTS_PRELOAD: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Django checks
        run: |
          python manage.py migrate --noinput
          python manage.py check
          DEBUG=0 DJANGO_SECRET_KEY="$DJANGO_SECRET_KEY" ALLOWED_HOSTS="perle-ecommerce.onrender.com" CSRF_TRUSTED_ORIGINS="https://perle-ecommerce.onrender.com" DATABASE_URL="$DATABASE_URL" python manage.py check --deploy
          python manage.py makemigrations --check --dry-run
          python manage.py test
          python manage.py collectstatic --noinput

      - name: Ruff
        run: ruff check .

      - name: Bandit (high severity gate)
        run: bandit -q -r apps core -lll

      - name: pip-audit
        run: pip-audit -r requirements.txt

  e2e:
    needs: quality-and-security
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ecommerce_perle
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Node dependencies
        run: npm install

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run E2E suite
        run: npx playwright test --project=chromium
